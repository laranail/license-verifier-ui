name: Static analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyse:
    name: Pint · PHPStan · Rector
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, fileinfo, pdo, sqlite3, pdo_sqlite, sodium
          coverage: none

      - name: Install dependencies
        run: composer update --prefer-stable --no-interaction --no-progress

      - name: Pint (lint)
        run: vendor/bin/pint --test

      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress

      - name: Rector (dry-run)
        run: vendor/bin/rector process --dry-run --no-progress-bar
